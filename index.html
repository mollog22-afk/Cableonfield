<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cableonfield PRO - Suite Ingegneristica</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
    <div class="dashboard">
        <div class="panel">
            <div class="logo-area">
                <div class="logo-text">CABLEONFIELD</div>
                <div class="tagline">MULTiphysics cable engineering suite</div>
            </div>
            
            <h2>Configurazione Progetto</h2>
            <div class="group">
                <label>MODULO SISTEMA</label>
                <select id="sistema" onchange="updateUI()">
                    <option value="LV">Bassa Tensione (LV) - 800V</option>
                    <option value="MV">Media Tensione (MV) - 30kV</option>
                    <option value="DC">Stringhe Solar (DC) - 1500V</option>
                </select>
            </div>

            <div class="group">
                <label>SEZIONE [mm²]</label>
                <select id="sez" onchange="calculate()"></select>
            </div>

            <div class="group">
                <label>CORRENTE PROGETTO Ib [A]</label>
                <input type="number" id="ib" value="238" oninput="calculate()">
            </div>

            <div class="group">
                <label>PROFONDITÀ POSA [m]</label>
                <input type="range" id="prof" min="0.5" max="2.0" step="0.1" value="0.8" oninput="calculate()">
                <div id="prof-val" class="val-display">0.8 m</div>
            </div>

            <div class="group">
                <label>TEMP. SUOLO [°C]</label>
                <input type="number" id="t_amb" value="45" oninput="calculate()">
            </div>

            
<div class="group">
    <label>CONFIGURAZIONE POSA (MODELLAZIONE GEOMETRICA)</label>
    <div class="pose-selector">
        <input type="radio" name="pose" id="p1" value="trifoglio" checked onchange="calculate()">
        <label for="p1" class="pose-card">
            <div class="pose-img-placeholder">☘️</div>
            <span>Trifoglio (IEC 60287)</span>
        </label>

        <input type="radio" name="pose" id="p2" value="piano" onchange="calculate()">
        <label for="p2" class="pose-card">
            <div class="pose-img-placeholder">平行</div>
            <span>In Piano (Distanziati)</span>
        </label>

        <input type="radio" name="pose" id="p3" value="batteria" onchange="calculate()">
        <label for="p3" class="pose-card highlight">
            <div class="pose-img-placeholder">🔳</div>
            <span>Batteria Multifisica</span>
        </label>
    </div>
</div>

            <button class="btn-main" onclick="generatePDF()">GENERA REPORT ESECUTIVO</button>
        </div>

        <div class="display-content">
            <div class="stats-grid">
                <div class="stat-card active"><span class="stat-val" id="res-dv">--</span><span class="stat-label">dV (%)</span></div>
                <div class="stat-card active"><span class="stat-val" id="res-iz">--</span><span class="stat-label">Portata Iz (A)</span></div>
                <div class="stat-card active"><span class="stat-val" id="res-pull">--</span><span class="stat-label">Tiro Posa (daN)</span></div>
                <div class="stat-card active"><span class="stat-val" id="res-mag">--</span><span class="stat-label">Campo B @1m (µT)</span></div>
            </div>
            
            <div class="canvas-area panel">
                <canvas id="thermalMap" width="800" height="420"></canvas>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
